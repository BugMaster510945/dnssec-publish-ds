[dnssec]
	FNPATTERN dnssec,nstime,(.*).rrd
	TITLE DNSSEC NS Response Time
	YAXIS Seconds
	DEF:t@RRDIDX@=@RRDFN@:elapsed:AVERAGE
	LINE1:t@RRDIDX@#@COLOR@:@RRDPARAM@
	GPRINT:t@RRDIDX@:LAST: \: %8.6lf (cur)
	GPRINT:t@RRDIDX@:MAX: \: %8.6lf (max)
	GPRINT:t@RRDIDX@:MIN: \: %8.6lf (min)
	GPRINT:t@RRDIDX@:AVERAGE: \: %8.6lf (avg)\n
