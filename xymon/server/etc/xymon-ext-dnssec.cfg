# xymon-ext-dnssec — DNSSEC monitoring probe
# Runs every 5 minutes.
#
# The probe reads its zone list from $HOSTSCFG (set in xymonserver.cfg).
# Configure monitored zones by adding the "dnssec" tag to host entries in
# /etc/xymon/hosts.cfg.  See xymon-ext-dnssec(1) for available per-zone options.
#
# An example configuration file is provided at:
#   /usr/share/doc/xymon-ext-dnssec/examples/xymon-ext-dnssec.yaml
# Copy it to /etc/xymon/xymon-ext-dnssec.yaml and edit as needed.

[xymon-ext-dnssec]
	ENVFILE /usr/lib/xymon/server/etc/xymonserver.cfg
	CMD $XYMONHOME/ext/xymon-ext-dnssec
	LOGFILE $XYMONSERVERLOGS/xymon-ext-dnssec.log
	INTERVAL 5m
